<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>IELTS Prep - 404 Not Found</title>

  <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Dashboard CSS -->
  <link href="assets/css/dashboard.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: var(--bg-primary);
    }
    .error-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 50px 30px;
      max-width: 500px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .error-icon-box {
      width: 80px;
      height: 80px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 24px;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 15px;
    }
    .error-text {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <!-- Theme Init Script (avoids flashing) -->
  <script>
    const savedTheme = localStorage.getItem('ielts-prep-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <div class="error-card">
    <div class="error-icon-box">
      <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Oops! Page Not Found</h2>
    <p class="error-text">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="index.html" class="btn btn-premium d-inline-flex">
      <i class="bi bi-house-door me-2"></i> Back to Dashboard
    </a>
  </div>

</body>

</html>
